<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMA Manager — Signing in…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #f8fafc; color: #475569;
    }
    .box {
      text-align: center; padding: 2rem;
    }
    p { font-size: 1rem; margin: 0.5rem 0; }
    .sub { font-size: 0.85rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="box">
    <p>Completing sign-in…</p>
    <p class="sub">This window will close automatically.</p>
  </div>
  <script>
    (function () {
      try {
        const params = new URLSearchParams(window.location.search);
        const code   = params.get('code');
        const error  = params.get('error');
        const state  = params.get('state');

        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            { type: 'rma_oauth_callback', code, error, state },
            window.location.origin
          );
          // Give the message a moment to deliver, then close
          setTimeout(() => window.close(), 300);
        } else {
          // Fallback: opener was closed or not available
          document.querySelector('p').textContent =
            'Sign-in complete. You may close this window and return to the app.';
        }
      } catch (e) {
        document.querySelector('p').textContent = 'Error: ' + e.message;
      }
    })();
  </script>
</body>
</html>
